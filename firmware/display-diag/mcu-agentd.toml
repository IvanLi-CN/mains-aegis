# Dedicated MCU agent config for the standalone display diagnostic firmware.

[project]
id = "esp_diag_fw"

[mcu.esp-diag]
backend = "espflash"
chip = "esp32s3"
artifact_elf = "../target/xtensa-esp32s3-none-elf/release/display-diag-fw"
selector_cache_file = "../.esp32-port"

[mcu.esp-diag.espflash]
baud = 115200
log_format = "defmt"
