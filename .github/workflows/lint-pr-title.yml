name: lint-pr-title

on:
  pull_request:

jobs:
  lint:
    name: PR title lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"
      - name: Install JS dev tools
        run: bun install --frozen-lockfile
      - name: Lint PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail
          tmp="$(mktemp)"
          printf "%s\n" "$PR_TITLE" > "$tmp"
          bun run commitlint -- --edit "$tmp"
