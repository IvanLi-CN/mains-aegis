name: ci

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "docs/**"
      - "docs-site/**"
      - "README.md"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "docs-site/**"
      - "README.md"

jobs:
  rustfmt:
    name: Rust fmt check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Rust (stable + rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check (firmware)
        run: |
          cd firmware
          cargo +stable fmt --all -- --check

  host-tests:
    name: Host pure-logic tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Run host unit tests
        run: bash firmware/scripts/run-host-unit-tests.sh
